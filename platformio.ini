[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

board_build.partitions = min_spiffs.csv

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit PN532 @ ^1.3.4
    adafruit/Adafruit BusIO @ ^1.15.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    ; SD.h bundled with ESP32 Arduino core
    ; mbedtls (SHA-256) bundled with ESP32 Arduino core

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17

; ── Flash commands ────────────────────────────────────────────────────────────
; 1. pio run --target upload        flash firmware
; 2. Copy sd_card/www/index.html → SD card /www/index.html
;
; Wiring (single VSPI bus):
;   SCK=18  MISO=19  MOSI=23
;   CS_IN=4  CS_OUT=25  CS_SD=32
;   RELAY=26  BUZZ=27  LED1=14  LED2=13  LED3=12
;   LCD SDA=21  SCL=22
