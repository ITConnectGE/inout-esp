[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

monitor_speed = 921600
upload_speed  = 921600

; Large app partition — camera + PSRAM code is big
board_build.partitions = huge_app.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Flash command:
;   cd cam-firmware && pio run --target upload
;
; Wiring (AI-Thinker ESP32-CAM):
;   CAM TX GPIO1  →  Main ESP32 RX GPIO34
;   CAM RX GPIO3  ←  Main ESP32 TX GPIO32
;   GND           ─  GND
;
; To program the CAM you need an external FTDI/CH340 adapter:
;   FTDI TX → CAM RX (GPIO3)
;   FTDI RX → CAM TX (GPIO1)
;   Pull GPIO0 to GND during power-on to enter flash mode.
;   Release GPIO0 after upload completes, then reset.
